# Default values for activepieces.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: ghcr.io/activepieces/activepieces
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Container configuration
container:
  port: 80

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  size: 2Gi
  mountPath: "/usr/src/app/cache"

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

activepieces:
  # ============================================================================
  # REQUIRED: Core configuration that must be set for production deployment
  # ============================================================================
  
  # The URL where Activepieces will be accessible (e.g., https://activepieces.yourdomain.com)
  frontendUrl: "http://localhost:4300"
  
  # Edition: ce (Community) or ee (Enterprise)
  # Community Edition (ce) is the default open-source version
  edition: "ce"
  
  # Execution mode for flows - see: https://www.activepieces.com/docs/install/architecture/workers
  # Options: SANDBOX_CODE_ONLY, UNSANDBOXED
  executionMode: "SANDBOX_CODE_ONLY"
  
  # Environment: prod or dev
  environment: "prod"
  
  # ============================================================================
  # OPTIONAL: Additional configuration (defaults are usually sufficient)
  # ============================================================================
  
  telemetryEnabled: true
  templatesSourceUrl: "https://cloud.activepieces.com/api/v1/templates"
  flowWorkerConcurrency: ""
  scheduledWorkerConcurrency: ""
  triggerDefaultPollInterval: ""
  triggerTimeoutSeconds: ""
  flowTimeoutSeconds: ""
  webhookTimeoutSeconds: ""
  executionDataRetentionDays: ""
  issueArchiveDays: ""
  pausedFlowTimeoutDays: ""
  logLevel: "info"
  logPretty: false
  apiRateLimiting:
    authn:
      enabled: false
      max: 100
      window: 60
  projectRateLimiter:
    enabled: false
  piecesSource: ""
  devPieces: false
  piecesSyncMode: ""

  # ============================================================================
  # OPTIONAL: Advanced configuration (only set if needed)
  # ============================================================================
  
  # Networking & API
  clientRealIpHeader: ""              # Header to extract real client IP (e.g., X-Forwarded-For)
  apiKey: ""                          # API key for platform authentication
  internalUrl: ""                     # Internal URL for service communication
  
  # Performance & Limits
  maxConcurrentJobsPerProject: ""     # Limit concurrent jobs per project
  maxFileSizeMb: ""                   # Maximum file upload size in MB
  sandboxMemoryLimit: ""              # Memory limit for sandbox execution
  sandboxPropagatedEnvVars: ""        # Environment variables to pass to sandbox
  
  # Integrations
  perplexityBaseUrl: ""               # Custom Perplexity AI base URL
  featurebaseApiKey: ""               # Featurebase API key for feedback
  appWebhookSecrets: ""               # Secrets for app webhooks
  
  # UI & Behavior
  showChangelog: true                 # Show changelog to users
  enableFlowOnPublish: true           # Auto-enable flows when published
  
  # System Paths
  configPath: ""                      # Custom config file path
  engineExecutablePath: "dist/packages/engine/main.js"  # Engine executable path

  # OpenTelemetry Configuration (for observability)
  otel:
    enabled: false
    exporterOtlpEndpoint: ""
    exporterOtlpHeaders: ""


# ============================================================================
# Bitnami PostgreSQL subchart (optional)
# Set enabled=true to deploy a bundled PostgreSQL instance.
# When enabled, add these vars to activepiecesEnvVariables and ensure they
# are present in activepieces-secrets:
#   AP_DB_TYPE=POSTGRES
#   AP_POSTGRES_HOST=<release-name>-postgresql
#   AP_POSTGRES_PORT=5432
#   AP_POSTGRES_DATABASE=activepieces
#   AP_POSTGRES_USERNAME=postgres
#   AP_POSTGRES_PASSWORD=<auto-generated or set auth.password below>
# Full subchart options: https://artifacthub.io/packages/helm/bitnami/postgresql
# ============================================================================
postgresql:
  enabled: false
  # auth:
  #   database: activepieces
  #   username: postgres
  #   password: ""        # leave empty to auto-generate
  # primary:
  #   persistence:
  #     enabled: true
  #     size: 8Gi

# ============================================================================
# Bitnami Redis subchart (optional)
# Set enabled=true to deploy a bundled Redis instance.
# When enabled, add these vars to activepiecesEnvVariables and ensure they
# are present in activepieces-secrets:
#   AP_REDIS_TYPE=DEFAULT
#   AP_REDIS_HOST=<release-name>-redis-master
#   AP_REDIS_PORT=6379
#   AP_REDIS_PASSWORD=<auto-generated or set auth.password below>
# Full subchart options: https://artifacthub.io/packages/helm/bitnami/redis
# ============================================================================
redis:
  enabled: false
  # auth:
  #   enabled: true
  #   password: ""        # leave empty to auto-generate
  # master:
  #   persistence:
  #     enabled: true
  #     size: 4Gi

# Deployment-specific, non-sensitive env vars set as plain values.
# Use this for vars that differ per release (e.g. APP vs WORKER) and don't belong in the shared secret.
activepiecesConfig:
  AP_CONTAINER_TYPE: ""

# Map of Kubernetes secret name → list of AP_* (and OTEL_*) env var names to inject.
# Each var name must exist as a key in the corresponding secret.
# Populate secrets with deploy/scripts/apply-secrets.sh --secret-name <name> before deploying.
activepiecesEnvVariables:
  activepieces-config-secrets:
    - AP_EDITION
    - AP_EXECUTION_MODE
    - AP_ENVIRONMENT
    - AP_FRONTEND_URL
    - AP_ENABLE_FLOW_ON_PUBLISH
    - AP_CLIENT_REAL_IP_HEADER
    - AP_DB_TYPE
    - AP_ENGINE_EXECUTABLE_PATH
    - AP_PLATFORM_ID_FOR_DEDICATED_WORKER
    - AP_PIECES_SYNC_MODE
    - AP_PIECES_SOURCE
  activepieces-auth-secrets:
    - AP_ENCRYPTION_KEY
    - AP_JWT_SECRET
    - AP_API_KEY
    - AP_WORKER_TOKEN
    - AP_GOOGLE_CLIENT_ID
    - AP_GOOGLE_CLIENT_SECRET
    - AP_FIREBASE_HASH_PARAMETERS
  activepieces-queue-secrets:
    - AP_QUEUE_UI_ENABLED
    - AP_QUEUE_UI_USERNAME
    - AP_QUEUE_UI_PASSWORD
  activepieces-log-secrets:
    - AP_LOG_LEVEL
    - AP_LOG_PRETTY
    - AP_SENTRY_DSN
    - AP_HYPERDX_TOKEN
  activepieces-telemetry-secrets:
    - AP_TELEMETRY_ENABLED
    - AP_OTEL_ENABLED
    - AP_FEATUREBASE_API_KEY
  activepieces-limits-secrets:
    - AP_MAX_CONCURRENT_JOBS_PER_PROJECT
    - AP_PROJECT_RATE_LIMITER_ENABLED
    - AP_API_RATE_LIMIT_AUTHN_ENABLED
    - AP_MAX_FILE_SIZE_MB
    - AP_MAX_FLOW_RUN_LOG_SIZE_MB
    - AP_EXECUTION_DATA_RETENTION_DAYS
    - AP_WEBHOOK_TIMEOUT_SECONDS
  activepieces-cloudflare-secrets:
    - AP_CLOUDFLARE_API_BASE
    - AP_CLOUDFLARE_ZONE_ID
    - AP_CLOUDFLARE_API_TOKEN
  activepieces-integrations-secrets:
    - AP_APP_WEBHOOK_SECRETS
    - AP_SECRET_MANAGER_API_KEY
    - AP_OPENROUTER_PROVISION_KEY
    - AP_TEMPLATES_API_KEY
    - AP_TEMPLATE_MANAGER_API_KEY
  activepieces-db-secrets:
    - AP_POSTGRES_DATABASE
    - AP_POSTGRES_HOST
    - AP_POSTGRES_PORT
    - AP_POSTGRES_PASSWORD
    - AP_POSTGRES_USERNAME
    - AP_POSTGRES_USE_SSL
    - AP_POSTGRES_POOL_SIZE
    - AP_POSTGRES_SSL_CA
  activepieces-redis-secrets:
    - AP_REDIS_TYPE
    - AP_REDIS_HOST
    - AP_REDIS_PORT
    - AP_REDIS_PASSWORD
    - AP_REDIS_USE_SSL
    - AP_REDIS_USER
  activepieces-s3-secrets:
    - AP_FILE_STORAGE_LOCATION
    - AP_S3_BUCKET
    - AP_S3_REGION
    - AP_S3_ENDPOINT
    - AP_S3_USE_SIGNED_URLS
    - AP_S3_ACCESS_KEY_ID
    - AP_S3_SECRET_ACCESS_KEY
  activepieces-smtp-secrets:
    - AP_SMTP_HOST
    - AP_SMTP_PORT
    - AP_SMTP_USERNAME
    - AP_SMTP_PASSWORD
    - AP_SMTP_SENDER_EMAIL
    - AP_SMTP_SENDER_NAME
  activepieces-stripe-secrets:
    - AP_STRIPE_SECRET_KEY
    - AP_STRIPE_WEBHOOK_SECRET
  activepieces-otel-secrets:
    - OTEL_EXPORTER_OTLP_ENDPOINT
    - OTEL_EXPORTER_OTLP_HEADERS
