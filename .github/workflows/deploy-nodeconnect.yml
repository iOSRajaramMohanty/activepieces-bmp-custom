name: Deploy NodeConnect to DOKS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NAMESPACE: nodeconnect
  STATEFULSET: nodeconnect-activepieces

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.prep.outputs.image_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image name
        id: prep
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=ghcr.io/${OWNER}/nodeconnect-app" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          echo "sha_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "ts_tag=${TIMESTAMP}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.prep.outputs.image_name }}:latest
            ${{ steps.prep.outputs.image_name }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.prep.outputs.image_name }}:${{ steps.meta.outputs.ts_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to DOKS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DOKS_CLUSTER_NAME }}

      - name: Rollout restart
        run: |
          kubectl rollout restart statefulset ${{ env.STATEFULSET }} -n ${{ env.NAMESPACE }}
          kubectl rollout status statefulset ${{ env.STATEFULSET }} -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Verify pods are healthy
        run: |
          sleep 30
          READY=$(kubectl get pods -n ${{ env.NAMESPACE }} -l app.kubernetes.io/name=activepieces -o jsonpath='{.items[*].status.containerStatuses[0].ready}')
          if echo "$READY" | grep -q "false"; then
            echo "::error::Some pods are not ready"
            kubectl get pods -n ${{ env.NAMESPACE }}
            kubectl logs -n ${{ env.NAMESPACE }} ${{ env.STATEFULSET }}-0 --tail=50
            exit 1
          fi
          echo "All pods are healthy"
          kubectl get pods -n ${{ env.NAMESPACE }}
