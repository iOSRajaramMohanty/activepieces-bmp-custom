name: Publish React UI SDK (Private)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/extensions/react-ui-sdk/**"
      - ".github/workflows/publish-sdk.yml"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Set up Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@iosrajarammohanty"

      - name: Install dependencies
        run: bun install

      - name: Fix workspace symlinks
        run: |
          rm -f node_modules/@activepieces/shared
          rm -f node_modules/@activepieces/pieces-framework
          rm -f node_modules/@activepieces/pieces-common
          ln -s ../../packages/shared node_modules/@activepieces/shared
          ln -s ../../packages/pieces/framework node_modules/@activepieces/pieces-framework
          ln -s ../../packages/pieces/common node_modules/@activepieces/pieces-common

      - name: Build SDK bundle
        run: npx nx run react-ui-sdk:bundle --skip-nx-cache

      - name: Fix bundle package.json for publishing
        env:
          SDK_PUBLISH_SCOPE: iosrajarammohanty
          SDK_PUBLISH_REGISTRY: https://npm.pkg.github.com
          SDK_PUBLISH_REPO_URL: https://github.com/iOSRajaramMohanty/activepieces-bmp-custom.git
        run: npx nx run react-ui-sdk:fix-bundle-package --skip-nx-cache

      - name: Publish package (skip if version already exists)
        working-directory: dist/packages/extensions/react-ui-sdk-bundled
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(npm publish 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "Cannot publish over existing version"; then
              echo "::notice::Version already published — skipping."
              exit 0
            fi
            exit 1
          }

