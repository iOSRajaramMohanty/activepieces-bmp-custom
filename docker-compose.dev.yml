# Docker development build - uses CONTAINERIZED PostgreSQL and Redis
# (Different from dev-local.sh / restart-all.sh which use existing host DB/Redis)
services:
  activepieces:
    build:
      context: .
      dockerfile: Dockerfile
    image: activepieces:dev
    container_name: activepieces-dev
    restart: unless-stopped
    # Host:container — set AP_PORT in env_file to match the container port (e.g. AP_PORT=3001 for 8080:3001).
    ports:
      - '8080:3001'
    depends_on:
      postgres-dev:
        condition: service_healthy
      redis-dev:
        condition: service_started
    env_file: .env.dev.backup
    environment:
      # Keep in sync with ports "HOST:CONTAINER" (container side must match Fastify listen port).
      AP_PORT: "3001"
    volumes:
      - ./cache:/usr/src/app/cache
      # Mount custom pieces source (for reference)
      - ./packages/pieces/custom:/usr/src/app/packages/pieces/custom
      # Mount BUILT custom pieces WITH dependencies installed
      - ./dist/packages/pieces/custom:/usr/src/app/dist/packages/pieces/custom
    networks:
      - activepieces-dev
    # Development: Lighter resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Development: Health check (must use same port as AP_PORT inside the container)
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://127.0.0.1:$${AP_PORT:-80}/api/v1/health\" >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Development: Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  postgres-dev:
    image: 'pgvector/pgvector:pg14'
    container_name: postgres-dev
    restart: unless-stopped
    # Docker dev: Expose on 5434 (different from existing 5433 - local FE 4300 keeps your data)
    ports:
      - '5434:5432'
    env_file: .env.dev.backup
    environment:
      - 'POSTGRES_DB=${AP_POSTGRES_DATABASE}'
      - 'POSTGRES_PASSWORD=${AP_POSTGRES_PASSWORD}'
      - 'POSTGRES_USER=${AP_POSTGRES_USERNAME}'
    volumes:
      - postgres_data_docker:/var/lib/postgresql/data
    networks:
      - activepieces-dev
    # Development: Lighter resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 256M
    # Development: Health check
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AP_POSTGRES_USERNAME} -d ${AP_POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Development: Logging
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  redis-dev:
    image: 'redis:7.0.7'
    container_name: redis-dev
    restart: unless-stopped
    # Docker dev: Redis without password for easier development
    command: redis-server --appendonly yes
    # Expose on 6380 (avoids conflict with existing host Redis on 6379)
    ports:
      - '6380:6379'
    volumes:
      - 'redis_data_dev:/data'
    networks:
      - activepieces-dev
    # Development: Lighter resource limits
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
        reservations:
          cpus: '0.05'
          memory: 128M
    # Development: Health check
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Development: Logging
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data_docker:
    driver: local
  redis_data_dev:
    driver: local

networks:
  activepieces-dev:
    driver: bridge
