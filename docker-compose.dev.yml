services:
  activepieces:
    build:
      context: .
      dockerfile: Dockerfile
    image: activepieces:dev
    container_name: activepieces-dev
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      postgres-dev:
        condition: service_healthy
      redis-dev:
        condition: service_started
    env_file: .env.dev.backup
    volumes:
      - ./cache:/usr/src/app/cache
      # Mount custom pieces source (for reference)
      - ./packages/pieces/custom:/usr/src/app/packages/pieces/custom
      # Mount BUILT custom pieces WITH dependencies installed
      - ./dist/packages/pieces/custom:/usr/src/app/dist/packages/pieces/custom
    networks:
      - activepieces-dev
    # Development: Lighter resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Development: Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Development: Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  postgres-dev:
    image: 'postgres:14.4'
    container_name: postgres-dev
    restart: unless-stopped
    # Dev: Expose on port 5433 (different from production)
    ports:
      - '5433:5432'
    env_file: .env.dev.backup
    environment:
      - 'POSTGRES_DB=${AP_POSTGRES_DATABASE}'
      - 'POSTGRES_PASSWORD=${AP_POSTGRES_PASSWORD}'
      - 'POSTGRES_USER=${AP_POSTGRES_USERNAME}'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - activepieces-dev
    # Development: Lighter resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 256M
    # Development: Health check
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AP_POSTGRES_USERNAME} -d ${AP_POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Development: Logging
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  redis-dev:
    image: 'redis:7.0.7'
    container_name: redis-dev
    restart: unless-stopped
    # Dev: Redis without password for easier development
    command: redis-server --appendonly yes
    # Dev: Expose Redis for debugging
    ports:
      - '6379:6379'
    volumes:
      - 'redis_data_dev:/data'
    networks:
      - activepieces-dev
    # Development: Lighter resource limits
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
        reservations:
          cpus: '0.05'
          memory: 128M
    # Development: Health check
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Development: Logging
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data_dev:
    external: true
    name: activepieces-bmp-custom_postgres_data_dev
  redis_data_dev:
    driver: local

networks:
  activepieces-dev:
    driver: bridge
